name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run edge:check-jwt-config
      - run: npm run verify:migrations
      - run: npm run audit:prod
      - name: Build without exposing server credentials
        env:
          VITE_OPENAI_API_KEY: roundrobin-openai-client-secret-canary
          VITE_HINDSIGHT_API_KEY: roundrobin-hindsight-client-secret-canary
          CLIENT_SECRET_CANARIES: roundrobin-openai-client-secret-canary,roundrobin-hindsight-client-secret-canary
        run: |
          npm run build
          npm run security:check-client-bundle

  edge-functions:
    name: Edge function checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - run: npm run edge:verify

  clinical-mcp:
    name: Clinical MCP checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clinical-mcp-server/package-lock.json
      - run: npm ci --prefix clinical-mcp-server
      - run: npm run clinical:typecheck
      - run: npm run clinical:test
      - run: npm run clinical:build
      - run: npm audit --prefix clinical-mcp-server --omit=dev

  browser-smoke:
    name: Browser smoke test
    needs: web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
