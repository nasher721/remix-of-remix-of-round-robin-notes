name: Toolchain Health

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify baseline npm scripts and lockfile toolchain packages
        run: node scripts/check-toolchain-health.mjs
