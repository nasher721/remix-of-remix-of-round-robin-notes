name: Deploy Supabase

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Verify workflow commit is the live main revision
        env:
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          live_main_sha="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | cut -f1)"
          if [ -z "$live_main_sha" ] || [ "$live_main_sha" != "$WORKFLOW_SHA" ]; then
            echo "::error::Refusing to deploy a workflow commit that is not the live main revision."
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.84.2

      - name: Revalidate exact commit before production mutation
        run: |
          npm run edge:check-jwt-config
          npm run verify:migrations
          npm run edge:verify

      - name: Confirm main did not advance during validation
        env:
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          live_main_sha="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | cut -f1)"
          if [ -z "$live_main_sha" ] || [ "$live_main_sha" != "$WORKFLOW_SHA" ]; then
            echo "::error::Main advanced during validation; a newer workflow run must deploy instead."
            exit 1
          fi

      - name: Enforce restricted auth enrollment
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          curl --fail-with-body --silent --show-error --request PATCH \
            "https://api.supabase.com/v1/projects/${PROJECT_ID}/config/auth" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"disable_signup":true}'

      - name: Link Supabase Project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: supabase link --project-ref "$PROJECT_ID"

      - name: Wait for database health
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db ping

      - name: Push Database Migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy

      - name: Smoke test — healthcheck edge function
        env:
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${ANON_KEY:-}" ]; then
            echo "::error::SUPABASE_ANON_KEY is not configured. Add it in Repo Settings → Secrets (same value as the Supabase anon/public API key). See docs/deployment.md."
            exit 1
          fi
          BASE="https://${PROJECT_ID}.supabase.co"
          echo "GET $BASE/functions/v1/healthcheck"
          code=$(curl -sS -o "$RUNNER_TEMP/hc.json" -w "%{http_code}" \
            "$BASE/functions/v1/healthcheck" \
            -H "Authorization: Bearer $ANON_KEY" \
            -H "apikey: $ANON_KEY")
          echo "HTTP status: $code"
          cat "$RUNNER_TEMP/hc.json"
          echo
          if [ "$code" != "200" ]; then
            echo "::error::healthcheck failed with HTTP $code"
            exit 1
          fi
          if ! grep -q '"status"[[:space:]]*:[[:space:]]*"healthy"' "$RUNNER_TEMP/hc.json"; then
            echo "::error::healthcheck body missing status healthy"
            exit 1
          fi
          echo "Smoke test passed."

      - name: Trigger Vercel production deploy (optional)
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${VERCEL_DEPLOY_HOOK_URL:-}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping (frontend still deploys on push via Git integration)."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy hook triggered."
        
      # Optional: To enforce strict type-safe databases locally vs prod
      # - name: Verify Database Types
      #   run: |
      #     supabase gen types typescript --linked > types.ts
      #     git diff --exit-code types.ts || echo "Remote types do not match local definitions. Run `supabase gen types typescript --local` and commit changes." && exit 1
